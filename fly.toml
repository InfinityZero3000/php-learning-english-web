primary_region = "sin"

[build]
  dockerfile = "Dockerfile.fly"

[deploy]
  release_command = "php artisan migrate --force"
  strategy = "rolling"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  DB_CONNECTION = "mysql"
  SESSION_DRIVER = "database"
  CACHE_STORE = "redis"
  QUEUE_CONNECTION = "redis"
  REDIS_CLIENT = "phpredis"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
